<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla del 3</title>
    <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

    <header class="header">
        <button class="btn" onclick="generarTablas()">GENERAR TABLA</button>
    </header>

    <main id="container" class="container">
        <h1>Tabla de Multiplicar</h1>

        <h2 id="titulo">Tabla del 3</h2>

        <div class="input-group">
           <label for="numero">Ingrese un número:</label>
           <input type="number" id="numero" placeholder="Ejemplo: 8">
           <small id="mensaje" class="mensaje"></small>

           <p class="help-text">
                Escribe un número mayor a 0 y presiona el botón para ver su tabla de multiplicar.
           </p>
        </div>


        <div id="tabla-contenedor" class="tabla">
            <div class="fila"><span>3 x 1</span> <span>=</span> <span>3</span></div>
            <div class="fila"><span>3 x 2</span> <span>=</span> <span>6</span></div>
            <div class="fila"><span>3 x 3</span> <span>=</span> <span>9</span></div>
            <div class="fila"><span>3 x 4</span> <span>=</span> <span>12</span></div>
            <div class="fila"><span>3 x 5</span> <span>=</span> <span>15</span></div>
            <div class="fila"><span>3 x 6</span> <span>=</span> <span>18</span></div>
            <div class="fila"><span>3 x 7</span> <span>=</span> <span>21</span></div>
            <div class="fila"><span>3 x 8</span> <span>=</span> <span>24</span></div>
            <div class="fila"><span>3 x 9</span> <span>=</span> <span>27</span></div>
            <div class="fila"><span>3 x 10</span> <span>=</span> <span>30</span></div>
        </div>
    </main>

    <footer class="footer">
        <p>Creado por: Macias Luis</p>
    </footer>
    <script src="multiplicar.js"></script>
</body>
</html>
